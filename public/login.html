<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
      :root {
    --primary: #2563eb; /* Тот самый "профессиональный синий" */
    --primary-hover: #1d4ed8;
    --bg-page: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --card-bg: #ffffff;
}

body {
    background-color: var(--bg-page);
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 30px 30px; /* Тонкая сетка на фоне, как в чертежах */
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Убираем старую анимацию совсем или делаем её статичным фоном */
.bg-animation {
    display: none; 
}

.login-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    position: relative;
}

.login-header {
    text-align: left; /* Смена выравнивания на левое часто выглядит современнее */
    margin-bottom: 32px;
}

.login-header h2 {
    color: var(--text-main);
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 8px 0;
    letter-spacing: -0.025em;
}

.login-header p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
}

/* Поля ввода */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    margin-bottom: 6px;
}

.form-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.2s;
    box-sizing: border-box;
    background-color: #fff;
    color: var(--text-main);
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

/* Иконки теперь опциональны, если хочешь оставить - вот стиль */
.input-icon {
    display: none; /* В этом стиле лучше обойтись без них или сделать серыми */
}

/* Кнопка */
.btn-login {
    width: 100%;
    padding: 12px;
    background-color: var(--text-main); /* Черная или очень темная кнопка сейчас в тренде */
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
    margin-top: 8px;
}

.btn-login:hover {
    background-color: #1e293b;
}

/* Доп опции */
.additional-options {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    font-size: 13px;
}

.forgot-password {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
}

.forgot-password:hover {
    text-decoration: underline;
}

.signup-link {
    text-align: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-muted);
}

.signup-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

/* Языковой селектор */
.language-selector {
    position: absolute;
    top: -60px;
    right: 0;
}

.language-selector select {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
}
        
    </style>
</head>
<body>

    <a href="https://t.me/Pavard5" class="creator" style="background: linear-gradient(to right, #1a3e7a, #6544ef33); z-index: 10000;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  position: fixed;
  bottom: 25px;
  right: 25px;
  box-shadow: 0px 0px 100px 100px rgba(0,0,0,0.09);"></a>
    <!-- Animatsion nuqtalar fon uchun -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <!-- Til tanlash -->
    
    
    <!-- Asosiy login konteyneri -->
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-user-shield"></i>
        </div>
        
        <div class="login-header">
            <h2>Tizimga kirish</h2>
            <p>Hisobingizga kirish uchun ma'lumotlaringizni kiriting</p>
        </div>
        
        <div id="error"></div>
        
        <div class="form-group">

        </div>
        
        <div class="form-group">

                <i class="fas fa-lock"></i>

            <input type="password" id="password" class="form-input" placeholder="Parol">
        </div>
        
        <div class="additional-options">
            <div class="remember-me">

                <label for="remember">Eslab qolish</label>
            </div>

        <br>
        
        <button id="btnLogin" class="btn-login">

    </div>
    
   
    
    <script src="login.js"></script>
</body>


</html>
