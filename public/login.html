<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
       :root {
    --primary: #3b82f6; /* Акцентный синий */
    --accent: #10b981;  /* Акцентный зеленый */
    --bg-dark: #0f172a; /* Глубокий темный фон */
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
}

body {
    background-color: var(--bg-dark);
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Фоновая анимация "Аврора" */
.bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
}

.bg-animation span {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    opacity: 0.4;
    animation: move 20s infinite alternate;
}

/* Переделываем старые кружочки в мягкие световые пятна */
.bg-animation span:nth-child(1) { width: 400px; height: 400px; background: var(--primary); left: -100px; top: -100px; }
.bg-animation span:nth-child(2) { width: 300px; height: 300px; background: #6366f1; right: -50px; bottom: -50px; animation-duration: 15s; }
.bg-animation span:nth-child(3) { width: 250px; height: 250px; background: var(--accent); left: 30%; top: 40%; animation-duration: 25s; }

@keyframes move {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(50px, 100px) scale(1.1); }
}

/* Контейнер логина */
.login-container {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    width: 100%;
    max-width: 400px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 1;
}

.login-header h2 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
    background: linear-gradient(to right, #fff, var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.login-header p {
    color: var(--text-dim);
    font-size: 15px;
}

/* Поля ввода */
.form-group {
    margin-bottom: 20px;
    position: relative;
}

.form-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 14px 14px 14px 45px;
    color: white;
    font-size: 15px;
    transition: all 0.2s ease;
    box-sizing: border-box;
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 18px;
    pointer-events: none;
}

.form-input:focus + .input-icon {
    color: var(--primary);
}

/* Кнопка */
.btn-login {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.btn-login:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
}

.btn-login:active { transform: translateY(0); }

/* Дополнительные опции */
.additional-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-dim);
}

.forgot-password {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
}

.forgot-password:hover { text-decoration: underline; }

.signup-link {
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
    color: var(--text-dim);
}

.signup-link a {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 600;
    margin-left: 5px;
}

/* Ошибки */
#error {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    margin-bottom: 20px;
    text-align: center;
    display: none;
}

#error.show { display: block; animation: shake 0.4s ease-in-out; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

/* Селектор языка */
.language-selector select {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    backdrop-filter: blur(10px);
}
        
    </style>
</head>
